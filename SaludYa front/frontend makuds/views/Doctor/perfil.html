    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludYa - Perfil del Profesional</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/alerts.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ---- Tarjeta info del paciente ---- */
        .info-card {
            background: linear-gradient(135deg, #1a9fb0 0%, #0d7a8a 100%);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(26, 159, 176, 0.35);
            padding: 32px 36px;
            max-width: 600px;
            margin: 32px auto 0;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .info-card-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .info-card-role {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 24px;
        }

        .info-item label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            display: block;
            margin-bottom: 3px;
        }

        .info-item span {
            font-size: 14px;
            font-weight: 500;
        }

        .info-item span.empty {
            opacity: 0.45;
            font-style: italic;
        }

        /* ---- Tarjeta formulario ---- */
        .profile-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            margin: 24px auto 40px;
            text-align: left;
        }

        .profile-title {
            color: #1a9fb0;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #75cdd8;
            border-radius: 4px;
            font-size: 13px;
            color: #1a9fb0;
            box-sizing: border-box;
            background-color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: #1a9fb0;
        }

        .form-input::placeholder {
            color: #92d4dd;
            font-size: 12px;
            text-transform: uppercase;
        }

        .profile-btn-container {
            text-align: center;
            margin-top: 40px;
        }

        .btn-update {
            background-color: #1a9fb0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .btn-update:hover {
            background-color: #158291;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
        }

        .btn-update:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

    <!-- Scripts -->
    <script src="../../js/mock_backend.js"></script>
    <script src="../../js/alerts.js"></script>
    <script src="../../js/script.js"></script>
    <script>
        const API = 'http://localhost:3000/api/auth';

        // Mostrar valor en la tarjeta de info (con fallback si está vacío)
        function setInfo(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value) {
                el.textContent = value;
                el.classList.remove('empty');
            } else {
                el.textContent = 'Sin registrar';
                el.classList.add('empty');
            }
        }

        document.getElementById('btnDesplegarForm').addEventListener('click', () => {
            const formContainer = document.getElementById('formularioContainer');
            if (formContainer.style.display === 'none' || formContainer.style.display === '') {
                formContainer.style.display = 'block';
            } else {
                formContainer.style.display = 'none';
            }
        });

        // Cargar perfil desde el servidor y rellenar ambas secciones
        async function cargarPerfil() {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const resp = await fetch(`${API}/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!resp.ok) return;

                const data = await resp.json();

                // --- Tarjeta de información ---
                setInfo('ic-nombre', data.nombre);
                setInfo('ic-email', data.email);
                setInfo('ic-contacto', data.numero_contacto);
                setInfo('ic-edad', data.edad ? `${data.edad} años` : null);
                setInfo('ic-nacimiento', data.fecha_nacimiento
                    ? new Date(data.fecha_nacimiento).toLocaleDateString('es-ES')
                    : null);
                setInfo('ic-direccion', data.direccion);

                // --- Pre-rellenar formulario ---
                document.getElementById('f-nombre').value = data.nombre || '';
                document.getElementById('f-email').value = data.email || '';
                document.getElementById('f-contacto').value = data.numero_contacto || '';
                document.getElementById('f-edad').value = data.edad || '';
                document.getElementById('f-nacimiento').value = data.fecha_nacimiento
                    ? data.fecha_nacimiento.split('T')[0]
                    : '';
                document.getElementById('f-direccion').value = data.direccion || '';

            } catch (err) {
                console.error('Error cargando perfil:', err);
            }
        }

        // Manejar envío del formulario
        document.getElementById('perfilForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const btn = document.getElementById('btnActualizar');

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            const payload = {
                nombre: document.getElementById('f-nombre').value.trim(),
                email: document.getElementById('f-email').value.trim(),
                numero_contacto: document.getElementById('f-contacto').value.trim(),
                edad: document.getElementById('f-edad').value || null,
                fecha_nacimiento: document.getElementById('f-nacimiento').value || null,
                direccion: document.getElementById('f-direccion').value.trim()
            };

            try {
                const resp = await fetch(`${API}/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await resp.json();

                if (resp.ok) {
                    // Actualizar el nombre en el localStorage para que el sidebar lo refleje
                    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
                    usuario.nombre = payload.nombre;
                    localStorage.setItem('usuario', JSON.stringify(usuario));

                    document.getElementById('formularioContainer').style.display = 'none';

                    AlertSystem.success('¡Perfil actualizado!', 'Tus datos han sido guardados correctamente.', () => {
                        cargarPerfil(); // Refrescar la tarjeta
                    });
                } else {
                    AlertSystem.error('Error', data.message || 'No se pudo actualizar.');
                }
            } catch (err) {
                AlertSystem.error('Error', 'No se pudo conectar con el servidor.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'ACTUALIZAR INFORMACIÓN';
            }
        });

        // Iniciar carga al cargar la página
        cargarPerfil();
    </script>

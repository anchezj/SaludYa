<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludYa - Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/alerts.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        .recovery-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            background-color: #ffffff;
            border: 1px solid #eaeaea; /* Borde sutil como en la imagen */
            border-radius: 15px;
        }

        .recovery-subtitle {
            color: var(--info-normal);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .recovery-form {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .recovery-form .input-group {
            margin-bottom: 25px;
        }

        .recovery-form .input-group input {
            padding: 15px;
            font-size: 14px;
        }
        
        .welcome-title {
            margin-bottom: 15px;
        }
        
        .main-container {
            border: 1px solid #eaeaea; /* Borde adicional para coincidir con la imagen */
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- Panel Único: Cambio de Contraseña -->
        <div class="recovery-panel">
            <div class="logo-wrapper">
                <img src="assest/logo.png" alt="Logo SaludYa" class="logo-image">
            </div>

            <h1 class="welcome-title">Bienvenido a SaludYa</h1>
            
            <p class="recovery-subtitle">Recuperar contraseña</p>

            <form class="recovery-form" id="recoveryForm">
                <div class="input-group">
                    <input type="password" id="newPassword" placeholder="Nueva Contraseña" required>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
                </div>

                <div class="submit-container">
                    <button type="submit" class="btn-solid" id="submitBtn">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/mock_backend.js"></script>
    <script src="js/script.js"></script>
    <script src="js/alerts.js"></script> 
</body>

</html>

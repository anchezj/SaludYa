<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludYa - Crear Cuenta</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/alerts.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>

<body>
    <div class="main-container">
        <!-- Panel Izquierdo: Bienvenida y Logo -->
        <div class="left-panel">
            <div class="logo-wrapper">
                <img src="assest/logo.png" alt="Logo SaludYa" class="logo-image">
            </div>

            <h1 class="welcome-title">Bienvenido a<br>SaludYa</h1>

            <div class="login-prompt">
                <p>Tienes una cuenta?</p>
                <a class="login-link">Inicia sesión aquí</a>
            </div>

            <a href="login.html">
                <button class="btn-solid login-btn">INICIAR SESIÓN</button>
            </a>
        </div>

        <!-- Panel Derecho: Formulario de Registro -->
        <div class="right-panel">
            <div class="form-card">
                <h2 class="form-title" id="formTitle">CREAR CUENTA</h2>

                <form id="authForm">
                    <div class="input-group" id="userGroup">
                        <input type="text" id="username" placeholder="Ingresar usuario" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Ingresar correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Ingresar contraseña" required>
                    </div>
                    <div class="input-group" id="confirmGroup">
                        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
                    </div>

                    <div class="submit-container">
                        <button type="submit" class="btn-solid register-btn" id="submitBtn">CREAR CUENTA</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/mock_backend.js"></script>
    <script src="js/script.js"></script>
    <script src="js/alerts.js"></script>
</body>

</html>

services:
  app:
    build: .
    container_name: saludya_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://saludya_user:saludya_pass@db:5432/saludya_db
      DB_SSL: "false"
      JWT_SECRET: cambia_este_secreto
      APP_URL: http://localhost:3000
      EMAIL_USER: ""
      EMAIL_PASS: ""
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: saludya_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saludya_db
      POSTGRES_USER: saludya_user
      POSTGRES_PASSWORD: saludya_pass
    volumes:
      - saludya_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saludya_user -d saludya_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  saludya_pgdata:
